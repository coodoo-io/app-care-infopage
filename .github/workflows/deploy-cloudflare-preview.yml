name: Preview Deploy to Cloudflare Pages

on:
  push:
    branches:
      - '**'

jobs:
  preview:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'Release v')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Sanitize branch name
        id: branch
        run: |
          SANITIZED=$(echo "preview-${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT
      - uses: cloudflare/pages-action@v1
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: app-care
          directory: dist
          branch: ${{ steps.branch.outputs.name }}
      - name: Summary
        run: |
          echo "### Preview deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ steps.branch.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Alias:** https://${{ steps.branch.outputs.name }}.app-care.pages.dev" >> $GITHUB_STEP_SUMMARY

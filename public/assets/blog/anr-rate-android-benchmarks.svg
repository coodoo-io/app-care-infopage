<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Google Play Schwellwerte fuer ANR-Rate und Crash-Rate im Vergleich">
  <title>Google Play Schwellwerte: ANR-Rate und Crash-Rate</title>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b" text-anchor="middle">Google Play Android Vitals: Bad Behavior Thresholds</text>
  <text x="400" y="56" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Ueberschreitung fuehrt zu schlechterem Store-Ranking und Warnhinweisen</text>

  <!-- === LEFT: ANR Rate === -->
  <text x="200" y="88" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">ANR-Rate</text>
  <text x="200" y="104" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">App Not Responding</text>

  <!-- ANR bar track background -->
  <rect x="60" y="118" width="280" height="36" fill="#e2e8f0" rx="18"/>

  <!-- ANR Green zone: 0 – 0.47% → proportional to scale 0–2% -->
  <!-- Scale: 280px = 2%, so 0.47% = 65.8px -->
  <rect x="60" y="118" width="66" height="36" fill="#10b981" rx="18"/>
  <!-- Overlap right rounded edge fix -->
  <rect x="102" y="118" width="24" height="36" fill="#10b981"/>

  <!-- ANR Orange zone: 0.47% – 1% → 1% = 140px, so width = 74.2px -->
  <rect x="126" y="118" width="74" height="36" fill="#f97316"/>

  <!-- ANR Red zone: 1% – 2% → width = 140px -->
  <rect x="200" y="118" width="140" height="36" fill="#ef4444" rx="0"/>
  <!-- right cap -->
  <rect x="322" y="118" width="18" height="36" fill="#ef4444" rx="18"/>

  <!-- ANR bar labels inside -->
  <text x="93" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">Gut</text>
  <text x="163" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">Warnung</text>
  <text x="267" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">Kritisch</text>

  <!-- ANR threshold markers -->
  <!-- 0% -->
  <line x1="60" y1="157" x2="60" y2="167" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">0 %</text>

  <!-- 0.47% -->
  <line x1="126" y1="155" x2="126" y2="167" stroke="#1e293b" stroke-width="2"/>
  <text x="126" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle" font-weight="700">0,47 %</text>
  <text x="126" y="192" font-family="system-ui, sans-serif" font-size="8" fill="#f97316" text-anchor="middle" font-weight="600">Bad Behavior</text>

  <!-- 1% -->
  <line x1="200" y1="155" x2="200" y2="167" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="200" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">1,0 %</text>

  <!-- 2% -->
  <line x1="340" y1="157" x2="340" y2="167" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="340" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">2,0 %</text>

  <!-- ANR zone descriptions -->
  <rect x="60" y="202" width="82" height="44" fill="#dcfce7" rx="6"/>
  <text x="101" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#166534" text-anchor="middle" font-weight="700">Gruen</text>
  <text x="101" y="233" font-family="system-ui, sans-serif" font-size="9" fill="#15803d" text-anchor="middle">Kein Eingriff</text>
  <text x="101" y="243" font-family="system-ui, sans-serif" font-size="8" fill="#16a34a" text-anchor="middle">durch Google</text>

  <rect x="148" y="202" width="82" height="44" fill="#fff7ed" rx="6"/>
  <text x="189" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412" text-anchor="middle" font-weight="700">Orange</text>
  <text x="189" y="233" font-family="system-ui, sans-serif" font-size="9" fill="#c2410c" text-anchor="middle">Warnung in der</text>
  <text x="189" y="243" font-family="system-ui, sans-serif" font-size="8" fill="#ea580c" text-anchor="middle">Play Console</text>

  <rect x="236" y="202" width="104" height="44" fill="#fef2f2" rx="6"/>
  <text x="288" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d" text-anchor="middle" font-weight="700">Rot</text>
  <text x="288" y="233" font-family="system-ui, sans-serif" font-size="9" fill="#991b1b" text-anchor="middle">Ranking-Verlust</text>
  <text x="288" y="243" font-family="system-ui, sans-serif" font-size="8" fill="#b91c1c" text-anchor="middle">im Play Store</text>

  <!-- === RIGHT: Crash Rate === -->
  <text x="600" y="88" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Crash-Rate</text>
  <text x="600" y="104" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">App-Absturze</text>

  <!-- Crash bar track background -->
  <rect x="460" y="118" width="280" height="36" fill="#e2e8f0" rx="18"/>

  <!-- Crash Green zone: 0 – 1.09% → 1.09/2 * 280 = 152.6px -->
  <rect x="460" y="118" width="153" height="36" fill="#10b981" rx="18"/>
  <rect x="570" y="118" width="43" height="36" fill="#10b981"/>

  <!-- Crash Orange zone: 1.09% – 2% → remaining to 280px = 127px -->
  <rect x="613" y="118" width="87" height="36" fill="#f97316"/>
  <!-- right red zone: > 2% just the edge -->
  <rect x="700" y="118" width="40" height="36" fill="#ef4444" rx="0"/>
  <rect x="722" y="118" width="18" height="36" fill="#ef4444" rx="18"/>

  <!-- Crash bar labels inside -->
  <text x="536" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">Gut</text>
  <text x="655" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">Warnung</text>
  <text x="722" y="141" font-family="system-ui, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">Kritisch</text>

  <!-- Crash threshold markers -->
  <!-- 0% -->
  <line x1="460" y1="157" x2="460" y2="167" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="460" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">0 %</text>

  <!-- 1.09% -->
  <line x1="613" y1="155" x2="613" y2="167" stroke="#1e293b" stroke-width="2"/>
  <text x="613" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle" font-weight="700">1,09 %</text>
  <text x="613" y="192" font-family="system-ui, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle" font-weight="600">Bad Behavior</text>

  <!-- 2% -->
  <line x1="740" y1="157" x2="740" y2="167" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="740" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">2,0 %</text>

  <!-- Crash zone descriptions -->
  <rect x="460" y="202" width="140" height="44" fill="#dcfce7" rx="6"/>
  <text x="530" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#166534" text-anchor="middle" font-weight="700">Gruen</text>
  <text x="530" y="233" font-family="system-ui, sans-serif" font-size="9" fill="#15803d" text-anchor="middle">Kein Eingriff</text>
  <text x="530" y="243" font-family="system-ui, sans-serif" font-size="8" fill="#16a34a" text-anchor="middle">durch Google</text>

  <rect x="606" y="202" width="82" height="44" fill="#fff7ed" rx="6"/>
  <text x="647" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412" text-anchor="middle" font-weight="700">Orange</text>
  <text x="647" y="233" font-family="system-ui, sans-serif" font-size="9" fill="#c2410c" text-anchor="middle">Warnung in der</text>
  <text x="647" y="243" font-family="system-ui, sans-serif" font-size="8" fill="#ea580c" text-anchor="middle">Play Console</text>

  <rect x="694" y="202" width="46" height="44" fill="#fef2f2" rx="6"/>
  <text x="717" y="220" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d" text-anchor="middle" font-weight="700">Rot</text>
  <text x="717" y="233" font-family="system-ui, sans-serif" font-size="9" fill="#991b1b" text-anchor="middle">Ranking-</text>
  <text x="717" y="243" font-family="system-ui, sans-serif" font-size="8" fill="#b91c1c" text-anchor="middle">Verlust</text>

  <!-- Vertical divider -->
  <line x1="420" y1="76" x2="420" y2="260" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Comparison callout box -->
  <rect x="60" y="275" width="680" height="100" fill="#fff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="400" y="300" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">Wichtig: ANR-Schwellwert ist strenger als Crash-Schwellwert</text>

  <!-- ANR summary -->
  <rect x="80" y="312" width="290" height="48" fill="#fff7ed" rx="8"/>
  <text x="225" y="332" font-family="system-ui, sans-serif" font-size="11" fill="#f97316" text-anchor="middle" font-weight="700">ANR Bad Behavior: 0,47 %</text>
  <text x="225" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#9a3412" text-anchor="middle">Nur 47 von 10.000 Sessions betroffen</text>
  <text x="225" y="361" font-family="system-ui, sans-serif" font-size="9" fill="#c2410c" text-anchor="middle">loest bereits einen Warnhinweis aus</text>

  <!-- Crash summary -->
  <rect x="428" y="312" width="290" height="48" fill="#fef2f2" rx="8"/>
  <text x="573" y="332" font-family="system-ui, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="700">Crash Bad Behavior: 1,09 %</text>
  <text x="573" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d" text-anchor="middle">Schwellwert liegt mehr als doppelt</text>
  <text x="573" y="361" font-family="system-ui, sans-serif" font-size="9" fill="#991b1b" text-anchor="middle">so hoch wie bei ANRs</text>
</svg>

<svg width="640" height="120" viewBox="0 0 640 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Crash Rate Bewertungsskala: Sehr gut unter 0,5%, Gut 0,5–1%, Akzeptabel 1–2%, Kritisch über 2%">
  <rect width="640" height="120" fill="#ffffff" rx="12"/>

  <text x="320" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">CRASH RATE BEWERTUNG</text>

  <!-- Segment: Sehr gut (green) — left-rounded -->
  <path d="M32,34 Q32,34 32,34 L180,34 L180,82 L32,82 Q24,82 24,74 L24,42 Q24,34 32,34 Z" fill="#10b981"/>
  <!-- Segment: Gut -->
  <rect x="180" y="34" width="148" height="48" fill="#6ee7b7"/>
  <!-- Segment: Akzeptabel -->
  <rect x="328" y="34" width="148" height="48" fill="#fb923c"/>
  <!-- Segment: Kritisch — right-rounded -->
  <path d="M476,34 L608,34 Q616,34 616,42 L616,74 Q616,82 608,82 L476,82 Z" fill="#ef4444"/>

  <!-- Dividers -->
  <line x1="180" y1="34" x2="180" y2="82" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="328" y1="34" x2="328" y2="82" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="476" y1="34" x2="476" y2="82" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Labels in segments -->
  <text x="102" y="56" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Sehr gut</text>
  <text x="254" y="56" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#064e3b">Gut</text>
  <text x="402" y="56" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Akzeptabel</text>
  <text x="546" y="56" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Kritisch</text>

  <!-- Crash rate values -->
  <text x="102" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="white" opacity="0.85">&lt; 0,5 %</text>
  <text x="254" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#065f46" opacity="0.85">0,5 – 1 %</text>
  <text x="402" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="white" opacity="0.85">1 – 2 %</text>
  <text x="546" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="white" opacity="0.85">&gt; 2 %</text>

  <!-- Crash-free labels below -->
  <text x="102" y="104" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">&gt; 99,5 % crash-frei</text>
  <text x="254" y="104" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">99 – 99,5 %</text>
  <text x="402" y="104" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">98 – 99 %</text>
  <text x="546" y="104" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af">&lt; 98 %</text>
</svg>

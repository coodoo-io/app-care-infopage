<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="In-App-Rating-Prompt: Optimale und schlechte Zeitpunkte im Nutzer-Journey" font-family="system-ui, sans-serif">
  <title>Rating-Prompt Timing: Gute und schlechte Zeitpunkte</title>

  <!-- Background -->
  <rect width="800" height="380" fill="#f8fafc" rx="12"/>

  <!-- Headline -->
  <text x="400" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">In-App-Rating-Prompt: Optimale Zeitpunkte im Nutzer-Journey</text>

  <!-- Journey track label left -->
  <text x="52" y="155" text-anchor="middle" font-size="10" fill="#94a3b8">App-</text>
  <text x="52" y="167" text-anchor="middle" font-size="10" fill="#94a3b8">Start</text>

  <!-- Journey track label right -->
  <text x="748" y="155" text-anchor="middle" font-size="10" fill="#94a3b8">Lang-</text>
  <text x="748" y="167" text-anchor="middle" font-size="10" fill="#94a3b8">zeit</text>

  <!-- Journey timeline line -->
  <line x1="72" y1="160" x2="726" y2="160" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow -->
  <polygon points="726,154 738,160 726,166" fill="#cbd5e1"/>

  <!-- ===== BAD POINTS (below the line) ===== -->

  <!-- Bad 1: Erster App-Start -->
  <line x1="118" y1="160" x2="118" y2="200" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="118" cy="160" r="7" fill="#ef4444"/>
  <rect x="54" y="204" width="128" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="118" y="223" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Erster App-Start</text>
  <text x="118" y="239" text-anchor="middle" font-size="10" fill="#ef4444">kein Wert erlebt</text>
  <text x="118" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Schlecht</text>

  <!-- Bad 2: Nach Fehler/Crash -->
  <line x1="330" y1="160" x2="330" y2="200" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="330" cy="160" r="8" fill="#ef4444"/>
  <rect x="254" y="204" width="152" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="330" y="223" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Nach Fehler / Absturz</text>
  <text x="330" y="239" text-anchor="middle" font-size="10" fill="#ef4444">Nutzer frustriert</text>
  <text x="330" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Sehr schlecht</text>

  <!-- Bad 3: Beim App-Schließen -->
  <line x1="680" y1="160" x2="680" y2="200" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="680" cy="160" r="7" fill="#ef4444"/>
  <rect x="614" y="204" width="132" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="680" y="223" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Beim App-Schließen</text>
  <text x="680" y="239" text-anchor="middle" font-size="10" fill="#ef4444">Exit-Momentum</text>
  <text x="680" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Schlecht</text>

  <!-- ===== GOOD POINTS (above the line) ===== -->

  <!-- Good 1: Nach Aha-Moment -->
  <line x1="420" y1="120" x2="420" y2="160" stroke="#10b981" stroke-width="2"/>
  <circle cx="420" cy="160" r="8" fill="#10b981"/>
  <rect x="346" y="66" width="148" height="50" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="420" y="85" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Nach Aha-Moment</text>
  <text x="420" y="101" text-anchor="middle" font-size="10" fill="#10b981">erster Kernnutzen erlebt</text>
  <text x="420" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Gut</text>

  <!-- Good 2: Nach erfolgreich abgeschlossener Aufgabe -->
  <line x1="538" y1="120" x2="538" y2="160" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="538" cy="160" r="9" fill="#10b981"/>
  <rect x="454" y="66" width="168" height="50" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="2"/>
  <text x="538" y="85" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Aufgabe abgeschlossen</text>
  <text x="538" y="101" text-anchor="middle" font-size="10" fill="#10b981">Ziel erreicht, positive Stimmung</text>
  <text x="538" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Sehr gut</text>

  <!-- Good 3: Nach X Sessions (positiv) -->
  <line x1="218" y1="120" x2="218" y2="160" stroke="#10b981" stroke-width="2"/>
  <circle cx="218" cy="160" r="7" fill="#10b981"/>
  <rect x="142" y="66" width="152" height="50" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="218" y="85" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Nach 5+ Sessions</text>
  <text x="218" y="101" text-anchor="middle" font-size="10" fill="#10b981">Nutzer kennt App, ist aktiv</text>
  <text x="218" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Gut</text>

  <!-- ===== Legend ===== -->
  <rect x="60" y="298" width="680" height="60" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Legende</text>

  <!-- Legend: good -->
  <circle cx="120" cy="340" r="6" fill="#10b981"/>
  <text x="132" y="344" font-size="11" fill="#475569">Guter Zeitpunkt</text>

  <!-- Legend: very good (larger circle) -->
  <circle cx="295" cy="340" r="8" fill="#10b981"/>
  <text x="309" y="344" font-size="11" fill="#475569">Sehr guter Zeitpunkt</text>

  <!-- Legend: bad -->
  <circle cx="480" cy="340" r="6" fill="#ef4444"/>
  <text x="492" y="344" font-size="11" fill="#475569">Schlechter Zeitpunkt</text>

  <!-- Legend: very bad (larger circle) -->
  <circle cx="640" cy="340" r="8" fill="#ef4444"/>
  <text x="654" y="344" font-size="11" fill="#475569">Sehr schlechter Zeitpunkt</text>
</svg>

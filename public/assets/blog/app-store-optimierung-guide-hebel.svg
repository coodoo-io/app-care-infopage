  <circle cx="578" cy="248" r="8" fill="#f97316"/>
  <text x="578" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">F</text>
  <text x="594" y="245" font-size="12" font-weight="600" fill="#7c2d12">Feature Graphic</text>
  <text x="594" y="258" font-size="10" fill="#64748b">Nur Google Play</text>

  <rect x="560" y="274" width="192" height="36" fill="#ffffff" rx="6" stroke="#fed7aa" stroke-width="1"/>
  <circle cx="578" cy="292" r="8" fill="#f97316"/>
  <text x="578" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">I</text>
  <text x="594" y="289" font-size="12" font-weight="600" fill="#7c2d12">Icon-Design</text>
  <text x="594" y="302" font-size="10" fill="#64748b">Bis 15% mehr Installs</text>

  <rect x="560" y="318" width="192" height="36" fill="#ffffff" rx="6" stroke="#fed7aa" stroke-width="1"/>
  <circle cx="578" cy="336" r="8" fill="#f97316"/>
  <text x="578" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">A</text>
  <text x="594" y="333" font-size="12" font-weight="600" fill="#7c2d12">A/B-Tests</text>

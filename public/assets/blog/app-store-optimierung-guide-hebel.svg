  <text x="400" y="37" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.5">ASO-Faktoren im Überblick</text>

  <!-- Column 1: On-Metadata -->
  <rect x="30" y="80" width="228" height="340" fill="#eff6ff" rx="10" stroke="#2563eb" stroke-width="1.5"/>

<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ASO-Faktoren: On-Metadata, Off-Metadata und Conversion-Hebel im Überblick" font-family="system-ui, sans-serif">
  <title>App Store Optimierung: Die drei Hebel-Kategorien</title>

  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#172554" rx="12"/>

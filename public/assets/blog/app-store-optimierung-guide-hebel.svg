  <text x="338" y="302" font-size="10" fill="#64748b">Bes. bei Google Play</text>

  <rect x="304" y="318" width="192" height="36" fill="#ffffff" rx="6" stroke="#a7f3d0" stroke-width="1"/>
  <circle cx="322" cy="336" r="8" fill="#10b981"/>
  <text x="322" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">L</text>
  <text x="338" y="333" font-size="12" font-weight="600" fill="#065f46">Externe Backlinks</text>
  <text x="338" y="346" font-size="10" fill="#64748b">Wirkung bei Google Play</text>

  <text x="400" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Indirekt beeinflussbar</text>


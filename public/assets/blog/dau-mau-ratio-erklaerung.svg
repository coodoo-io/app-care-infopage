<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" role="img" aria-label="DAU/MAU-Ratio erklärt: Formel und visuelles Konzept">
  <title>DAU/MAU-Ratio: Stickiness berechnen</title>
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="#f8fafc" rx="12"/>

  <!-- Left panel: Visual concept -->
  <!-- MAU circle (large, outer) -->
  <circle cx="220" cy="175" r="130" fill="#2563eb" fill-opacity="0.10" stroke="#2563eb" stroke-width="2"/>
  <!-- DAU circle (smaller, inside MAU) -->
  <circle cx="220" cy="175" r="70" fill="#2563eb" fill-opacity="0.25" stroke="#2563eb" stroke-width="2"/>

  <!-- MAU label -->
  <text x="220" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">MAU</text>
  <text x="220" y="76" text-anchor="middle" font-size="11" fill="#3b82f6">10.000 Nutzer/Monat</text>

  <!-- DAU label inside inner circle -->
  <text x="220" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">DAU</text>
  <text x="220" y="185" text-anchor="middle" font-size="11" fill="#1e40af">2.500 Nutzer/Tag</text>

  <!-- Arrow and label for the outer ring -->
  <line x1="330" y1="100" x2="310" y2="132" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="338" y="97" text-anchor="start" font-size="11" fill="#3b82f6">Nutzer, die nur</text>
  <text x="338" y="111" text-anchor="start" font-size="11" fill="#3b82f6">gelegentlich kommen</text>

  <!-- Arrow and label for the inner circle -->
  <line x1="290" y1="240" x2="248" y2="210" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-navy)"/>
  <text x="296" y="238" text-anchor="start" font-size="11" fill="#1e40af">Täglich aktive</text>
  <text x="296" y="252" text-anchor="start" font-size="11" fill="#1e40af">Nutzer (DAU)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-navy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e40af"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="320" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Right panel: Formula and result -->
  <text x="590" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Formel</text>

  <!-- Formula box -->
  <rect x="450" y="75" width="280" height="56" rx="8" fill="#1e3a8a"/>
  <text x="590" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">DAU ÷ MAU × 100</text>
  <text x="590" y="121" text-anchor="middle" font-size="12" fill="#93c5fd">= Stickiness in %</text>

  <!-- Example calculation -->
  <text x="590" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Beispiel-Berechnung</text>

  <!-- Calculation steps -->
  <rect x="450" y="172" width="280" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="470" y="196" font-size="12" fill="#64748b">DAU (täglich aktiv):</text>
  <text x="710" y="196" text-anchor="end" font-size="12" font-weight="600" fill="#2563eb">2.500</text>

  <line x1="470" y1="205" x2="710" y2="205" stroke="#f1f5f9" stroke-width="1"/>

  <text x="470" y="222" font-size="12" fill="#64748b">MAU (monatlich aktiv):</text>
  <text x="710" y="222" text-anchor="end" font-size="12" font-weight="600" fill="#2563eb">10.000</text>

  <line x1="470" y1="231" x2="710" y2="231" stroke="#f1f5f9" stroke-width="1"/>

  <text x="470" y="248" font-size="12" fill="#64748b">2.500 ÷ 10.000 × 100</text>
  <text x="710" y="248" text-anchor="end" font-size="12" font-weight="600" fill="#64748b">= ?</text>

  <line x1="470" y1="256" x2="710" y2="256" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="470" y="272" font-size="13" font-weight="700" fill="#0f172a">Stickiness:</text>
  <text x="710" y="272" text-anchor="end" font-size="15" font-weight="700" fill="#10b981">25 %</text>

  <!-- Result interpretation -->
  <rect x="450" y="285" width="280" height="38" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="590" y="303" text-anchor="middle" font-size="11" fill="#065f46">Jeder 4. Monatsnutzer ist taeglich aktiv</text>
  <text x="590" y="317" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Gut fuer die meisten App-Typen</text>

  <!-- Left panel bottom label -->
  <text x="220" y="325" text-anchor="middle" font-size="12" fill="#64748b">Groesseres Set = MAU, kleineres Set = DAU</text>
</svg>

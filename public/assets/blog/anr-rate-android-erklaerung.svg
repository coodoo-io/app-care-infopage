<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="ANR vs. Crash: Unterschiede und Auswirkungen im Vergleich">
  <title>ANR vs. Crash bei Android-Apps</title>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" rx="12"/>

  <!-- Left panel: ANR -->
  <rect x="24" y="24" width="360" height="352" fill="#fff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ANR header -->
  <rect x="24" y="24" width="360" height="56" fill="#f97316" rx="10"/>
  <rect x="24" y="56" width="360" height="24" fill="#f97316"/>
  <text x="204" y="58" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">ANR</text>
  <text x="204" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.9">App Not Responding</text>

  <!-- ANR icon: frozen phone -->
  <rect x="160" y="98" width="88" height="52" fill="#fff3e0" rx="8" stroke="#f97316" stroke-width="2"/>
  <text x="204" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#f97316" text-anchor="middle" font-weight="600">MAIN THREAD</text>
  <text x="204" y="143" font-family="system-ui, sans-serif" font-size="10" fill="#ea580c" text-anchor="middle">blockiert</text>

  <!-- Arrow down -->
  <line x1="204" y1="152" x2="204" y2="172" stroke="#f97316" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="199,170 209,170 204,178" fill="#f97316"/>

  <!-- Timer box -->
  <rect x="152" y="180" width="104" height="36" fill="#fff7ed" rx="6" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="204" y="201" font-family="system-ui, sans-serif" font-size="11" fill="#c2410c" text-anchor="middle" font-weight="600">Timeout: 5 Sekunden</text>
  <text x="204" y="214" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412" text-anchor="middle">Eingaben werden ignoriert</text>

  <!-- Arrow down -->
  <line x1="204" y1="218" x2="204" y2="238" stroke="#f97316" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="199,236 209,236 204,244" fill="#f97316"/>

  <!-- System dialog box -->
  <rect x="132" y="246" width="144" height="48" fill="#fff" rx="6" stroke="#f97316" stroke-width="2"/>
  <text x="204" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#374151" text-anchor="middle" font-weight="600">App antwortet nicht</text>
  <text x="204" y="279" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Schliessen oder Warten?</text>
  <text x="204" y="290" font-family="system-ui, sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">Android Systemdialog</text>

  <!-- ANR consequences -->
  <rect x="48" y="308" width="312" height="52" fill="#fff7ed" rx="6"/>
  <text x="204" y="326" font-family="system-ui, sans-serif" font-size="10" fill="#7c2d12" text-anchor="middle" font-weight="700">Auswirkungen</text>
  <text x="204" y="341" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412" text-anchor="middle">Nutzerfrust + schlechte Bewertungen</text>
  <text x="204" y="354" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412" text-anchor="middle">Google Play Bad Behavior ab 0,47 %</text>

  <!-- Right panel: Crash -->
  <rect x="416" y="24" width="360" height="352" fill="#fff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Crash header -->
  <rect x="416" y="24" width="360" height="56" fill="#ef4444" rx="10"/>
  <rect x="416" y="56" width="360" height="24" fill="#ef4444"/>
  <text x="596" y="58" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Crash</text>
  <text x="596" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.9">App stuerzt ab</text>

  <!-- Crash icon: exception -->
  <rect x="552" y="98" width="88" height="52" fill="#fef2f2" rx="8" stroke="#ef4444" stroke-width="2"/>
  <text x="596" y="124" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="600">Unbehandelte</text>
  <text x="596" y="138" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle" font-weight="600">Exception / Error</text>

  <!-- Arrow down -->
  <line x1="596" y1="152" x2="596" y2="172" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="591,170 601,170 596,178" fill="#ef4444"/>

  <!-- Instant box -->
  <rect x="544" y="180" width="104" height="36" fill="#fef2f2" rx="6" stroke="#fecaca" stroke-width="1.5"/>
  <text x="596" y="201" font-family="system-ui, sans-serif" font-size="11" fill="#991b1b" text-anchor="middle" font-weight="600">Sofortiger Abbruch</text>
  <text x="596" y="214" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d" text-anchor="middle">App schliesst sich</text>

  <!-- Arrow down -->
  <line x1="596" y1="218" x2="596" y2="238" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="591,236 601,236 596,244" fill="#ef4444"/>

  <!-- App closed box -->
  <rect x="524" y="246" width="144" height="48" fill="#fff" rx="6" stroke="#ef4444" stroke-width="2"/>
  <text x="596" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#374151" text-anchor="middle" font-weight="600">App wird beendet</text>
  <text x="596" y="279" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Kein Dialog, sofortiges Ende</text>
  <text x="596" y="290" font-family="system-ui, sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">Stack Trace in Crashlytics</text>

  <!-- Crash consequences -->
  <rect x="440" y="308" width="312" height="52" fill="#fef2f2" rx="6"/>
  <text x="596" y="326" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d" text-anchor="middle" font-weight="700">Auswirkungen</text>
  <text x="596" y="341" font-family="system-ui, sans-serif" font-size="9" fill="#991b1b" text-anchor="middle">Abrupter Abbruch fuer den Nutzer</text>
  <text x="596" y="354" font-family="system-ui, sans-serif" font-size="9" fill="#991b1b" text-anchor="middle">Google Play Bad Behavior ab 1,09 %</text>

  <!-- Center divider label -->
  <rect x="371" y="186" width="58" height="28" fill="#f1f5f9" rx="14" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="205" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">vs.</text>
</svg>

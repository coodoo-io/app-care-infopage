<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Monatliche Churn Rate Benchmarks nach App-Kategorie im Vergleich" font-family="system-ui, sans-serif">
  <title>Churn Rate Benchmarks nach App-Kategorie</title>

  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff" rx="12"/>

  <!-- Chart title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Monatliche Churn Rate nach App-Kategorie</text>

  <!--
    Chart area: left=200, top=55, right=720, bottom=355
    6 categories, each bar row height = 50px
    Y positions (bar center): 80, 130, 180, 230, 280, 330
    Bar height: 32px, so top = center-16, bottom = center+16

    X scale: 0% at x=200, 10% at x=720
    Scale width = 520px for 10%, so 1% = 52px
    x for value v = 200 + v * 52

    Categories (top to bottom, ascending churn):
    1. Finance/Banking   3%  -> x_end = 200 + 3*52 = 356
    2. Health & Fitness  4%  -> x_end = 200 + 4*52 = 408
    3. Productivity      5%  -> x_end = 200 + 5*52 = 460
    4. E-Commerce        7%  -> x_end = 200 + 7*52 = 564
    5. Gaming            8%  -> x_end = 200 + 8*52 = 616
    6. Social            9%  -> x_end = 200 + 9*52 = 668
  -->

  <!-- X axis grid lines and labels -->
  <!-- x positions: 0%=200, 2%=304, 4%=408, 6%=512, 8%=616, 10%=720 -->
  <line x1="200" y1="55" x2="200" y2="355" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="304" y1="55" x2="304" y2="355" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="408" y1="55" x2="408" y2="355" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="512" y1="55" x2="512" y2="355" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="616" y1="55" x2="616" y2="355" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="720" y1="55" x2="720" y2="355" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- X axis labels -->
  <text x="200" y="370" text-anchor="middle" font-size="11" fill="#64748b">0 %</text>
  <text x="304" y="370" text-anchor="middle" font-size="11" fill="#64748b">2 %</text>
  <text x="408" y="370" text-anchor="middle" font-size="11" fill="#64748b">4 %</text>
  <text x="512" y="370" text-anchor="middle" font-size="11" fill="#64748b">6 %</text>
  <text x="616" y="370" text-anchor="middle" font-size="11" fill="#64748b">8 %</text>
  <text x="720" y="370" text-anchor="middle" font-size="11" fill="#64748b">10 %</text>

  <!-- X axis label -->
  <text x="460" y="390" text-anchor="middle" font-size="12" fill="#475569">Monatliche Churn Rate</text>

  <!-- Row 1: Finance / Banking — 3% — #10b981 (best) -->
  <text x="190" y="89" text-anchor="end" font-size="13" fill="#334155">Finance / Banking</text>
  <rect x="200" y="64" width="156" height="32" fill="#10b981" rx="4"/>
  <text x="364" y="85" font-size="12" font-weight="600" fill="#065f46" dx="6">3 %</text>

  <!-- Row 2: Health & Fitness — 4% — #34d399 -->
  <text x="190" y="139" text-anchor="end" font-size="13" fill="#334155">Health &amp; Fitness</text>
  <rect x="200" y="114" width="208" height="32" fill="#34d399" rx="4"/>
  <text x="414" y="135" font-size="12" font-weight="600" fill="#065f46" dx="6">4 %</text>

  <!-- Row 3: Productivity / SaaS — 5% — #fbbf24 -->
  <text x="190" y="189" text-anchor="end" font-size="13" fill="#334155">Productivity</text>
  <rect x="200" y="164" width="260" height="32" fill="#fbbf24" rx="4"/>
  <text x="466" y="185" font-size="12" font-weight="600" fill="#78350f" dx="6">5 %</text>

  <!-- Row 4: E-Commerce — 7% — #fb923c -->
  <text x="190" y="239" text-anchor="end" font-size="13" fill="#334155">E-Commerce</text>
  <rect x="200" y="214" width="364" height="32" fill="#fb923c" rx="4"/>
  <text x="570" y="235" font-size="12" font-weight="600" fill="#7c2d12" dx="6">7 %</text>

  <!-- Row 5: Gaming — 8% — #f97316 -->
  <text x="190" y="289" text-anchor="end" font-size="13" fill="#334155">Gaming</text>
  <rect x="200" y="264" width="416" height="32" fill="#f97316" rx="4"/>
  <text x="622" y="285" font-size="12" font-weight="600" fill="#7c2d12" dx="6">8 %</text>

  <!-- Row 6: Social — 9% — #ef4444 (worst) -->
  <text x="190" y="339" text-anchor="end" font-size="13" fill="#334155">Social</text>
  <rect x="200" y="314" width="468" height="32" fill="#ef4444" rx="4"/>
  <text x="674" y="335" font-size="12" font-weight="600" fill="#7f1d1d" dx="6">9 %</text>

  <!-- Subtitle note -->
  <text x="400" y="46" text-anchor="middle" font-size="11" fill="#94a3b8">Median-Richtwerte — monatlicher Churn nach Kategorie</text>
</svg>

<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Benchmark-Tabelle für App-Onboarding-Metriken mit Bewertungsstufen" font-family="system-ui, sans-serif">
  <title>Onboarding-Metriken: Benchmark-Werte für Completion Rate, Time-to-Value, Day-1-Retention und Permission Accept Rate</title>

  <!-- Background -->
  <rect width="800" height="300" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Onboarding-Metriken: Benchmark-Werte im Überblick</text>

  <!-- Header row background -->
  <rect x="20" y="48" width="760" height="32" rx="6" fill="#0f172a"/>

  <!-- Header labels -->
  <text x="160" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Metrik</text>
  <text x="350" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#10b981">Gut</text>
  <text x="510" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#f97316">Mittel</text>
  <text x="670" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">Schlecht</text>

  <!-- Column dividers in header -->
  <line x1="270" y1="52" x2="270" y2="76" stroke="#334155" stroke-width="1"/>
  <line x1="430" y1="52" x2="430" y2="76" stroke="#334155" stroke-width="1"/>
  <line x1="590" y1="52" x2="590" y2="76" stroke="#334155" stroke-width="1"/>

  <!-- Row 1: Onboarding Completion Rate -->
  <rect x="20" y="82" width="760" height="46" rx="0" fill="#ffffff"/>
  <rect x="20" y="82" width="6" height="46" fill="#2563eb"/>
  <text x="34" y="100" font-size="11" font-weight="600" fill="#0f172a">Onboarding</text>
  <text x="34" y="116" font-size="11" font-weight="600" fill="#0f172a">Completion Rate</text>

  <!-- Good cell -->
  <rect x="272" y="86" width="156" height="38" rx="6" fill="#d1fae5"/>
  <text x="350" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">&gt; 70 %</text>
  <text x="350" y="118" text-anchor="middle" font-size="10" fill="#065f46">Sehr guter Flow</text>

  <!-- Medium cell -->
  <rect x="432" y="86" width="156" height="38" rx="6" fill="#ffedd5"/>
  <text x="510" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">50 – 70 %</text>
  <text x="510" y="118" text-anchor="middle" font-size="10" fill="#9a3412">Optimierungsbedarf</text>

  <!-- Bad cell -->
  <rect x="592" y="86" width="156" height="38" rx="6" fill="#fee2e2"/>
  <text x="670" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">&lt; 50 %</text>
  <text x="670" y="118" text-anchor="middle" font-size="10" fill="#991b1b">Kritisch — sofort handeln</text>

  <!-- Row 2: Time-to-Value -->
  <rect x="20" y="130" width="760" height="46" rx="0" fill="#f8fafc"/>
  <rect x="20" y="130" width="6" height="46" fill="#2563eb"/>
  <text x="34" y="148" font-size="11" font-weight="600" fill="#0f172a">Time-to-Value</text>
  <text x="34" y="164" font-size="11" fill="#64748b">(bis zum Aha-Moment)</text>

  <!-- Good cell -->
  <rect x="272" y="134" width="156" height="38" rx="6" fill="#d1fae5"/>
  <text x="350" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">&lt; 60 Sek.</text>
  <text x="350" y="166" text-anchor="middle" font-size="10" fill="#065f46">Exzellent</text>

  <!-- Medium cell -->
  <rect x="432" y="134" width="156" height="38" rx="6" fill="#ffedd5"/>
  <text x="510" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">1 – 3 Min.</text>
  <text x="510" y="166" text-anchor="middle" font-size="10" fill="#9a3412">Akzeptabel</text>

  <!-- Bad cell -->
  <rect x="592" y="134" width="156" height="38" rx="6" fill="#fee2e2"/>
  <text x="670" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">&gt; 3 Min.</text>
  <text x="670" y="166" text-anchor="middle" font-size="10" fill="#991b1b">Zu lange — kürzen</text>

  <!-- Row 3: Day-1-Retention -->
  <rect x="20" y="178" width="760" height="46" rx="0" fill="#ffffff"/>
  <rect x="20" y="178" width="6" height="46" fill="#2563eb"/>
  <text x="34" y="196" font-size="11" font-weight="600" fill="#0f172a">Day-1-Retention</text>
  <text x="34" y="212" font-size="11" fill="#64748b">(nach Onboarding-Abschluss)</text>

  <!-- Good cell -->
  <rect x="272" y="182" width="156" height="38" rx="6" fill="#d1fae5"/>
  <text x="350" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">&gt; 40 %</text>
  <text x="350" y="214" text-anchor="middle" font-size="10" fill="#065f46">Starke Bindung</text>

  <!-- Medium cell -->
  <rect x="432" y="182" width="156" height="38" rx="6" fill="#ffedd5"/>
  <text x="510" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">25 – 40 %</text>
  <text x="510" y="214" text-anchor="middle" font-size="10" fill="#9a3412">Luft nach oben</text>

  <!-- Bad cell -->
  <rect x="592" y="182" width="156" height="38" rx="6" fill="#fee2e2"/>
  <text x="670" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">&lt; 25 %</text>
  <text x="670" y="214" text-anchor="middle" font-size="10" fill="#991b1b">Produkt- oder Flow-Problem</text>

  <!-- Row 4: Permission Accept Rate -->
  <rect x="20" y="226" width="760" height="46" rx="0" fill="#f8fafc"/>
  <rect x="20" y="226" width="6" height="46" fill="#2563eb"/>
  <text x="34" y="244" font-size="11" font-weight="600" fill="#0f172a">Permission</text>
  <text x="34" y="260" font-size="11" font-weight="600" fill="#0f172a">Accept Rate (Push)</text>

  <!-- Good cell -->
  <rect x="272" y="230" width="156" height="38" rx="6" fill="#d1fae5"/>
  <text x="350" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">&gt; 60 %</text>
  <text x="350" y="262" text-anchor="middle" font-size="10" fill="#065f46">Gutes Timing</text>

  <!-- Medium cell -->
  <rect x="432" y="230" width="156" height="38" rx="6" fill="#ffedd5"/>
  <text x="510" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">40 – 60 %</text>
  <text x="510" y="262" text-anchor="middle" font-size="10" fill="#9a3412">Kontext verbessern</text>

  <!-- Bad cell -->
  <rect x="592" y="230" width="156" height="38" rx="6" fill="#fee2e2"/>
  <text x="670" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">&lt; 40 %</text>
  <text x="670" y="262" text-anchor="middle" font-size="10" fill="#991b1b">Zu früh angefragt</text>

  <!-- Bottom border -->
  <rect x="20" y="272" width="760" height="2" rx="1" fill="#e2e8f0"/>

  <!-- Source note -->
  <text x="400" y="291" text-anchor="middle" font-size="9" fill="#94a3b8">Quelle: App-Care — Branchenbenchmarks (AppsFlyer, Leanplum, UXCam). Werte als Orientierung, kein Ersatz für app-spezifisches Tracking.</text>
</svg>

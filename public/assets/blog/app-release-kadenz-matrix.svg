<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Release-Kadenz-Matrix: Update-Häufigkeit vs. Update-Qualität mit vier Quadranten">
  <title>Release-Kadenz-Matrix: Häufigkeit vs. Qualität — optimale Zonen</title>

  <!-- Background -->
  <rect width="800" height="480" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Release-Kadenz-Matrix</text>
  <text x="400" y="56" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Häufigkeit der Updates vs. Qualität der Updates</text>

  <!-- Matrix area: x=120, y=80, width=560, height=320 -->
  <!-- Center: x=400, y=240 -->

  <!-- Quadrant backgrounds -->
  <!-- Top-left: Selten + Hohe Qualität = Akzeptabel (orange) -->
  <rect x="120" y="80" width="280" height="160" fill="#fff7ed" rx="6"/>
  <!-- Top-right: Häufig + Hohe Qualität = Optimale Zone (green) -->
  <rect x="400" y="80" width="280" height="160" fill="#f0fdf4" rx="6"/>
  <!-- Bottom-left: Selten + Niedrige Qualität = Risiko-Zone (red) -->
  <rect x="120" y="240" width="280" height="160" fill="#fef2f2" rx="6"/>
  <!-- Bottom-right: Häufig + Niedrige Qualität = Bug-Schleife (red) -->
  <rect x="400" y="240" width="280" height="160" fill="#fef2f2" rx="6"/>

  <!-- Quadrant borders -->
  <rect x="120" y="80" width="560" height="320" fill="none" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <!-- Vertical center divider -->
  <line x1="400" y1="80" x2="400" y2="400" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Horizontal center divider -->
  <line x1="120" y1="240" x2="680" y2="240" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Quadrant labels and descriptions -->

  <!-- Top-left: Akzeptabel -->
  <text x="260" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#c2410c" text-anchor="middle">Akzeptabel</text>
  <text x="260" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#9a3412" text-anchor="middle">Selten, aber solide</text>
  <text x="260" y="168" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">Store-Sichtbarkeit leidet,</text>
  <text x="260" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">aber Nutzer bleiben stabil.</text>
  <text x="260" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">Typisch: Enterprise-Apps</text>
  <!-- Orange badge -->
  <rect x="218" y="212" width="84" height="20" fill="#f97316" rx="10"/>
  <text x="260" y="226" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Suboptimal</text>

  <!-- Top-right: Optimale Zone -->
  <text x="540" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">Optimale Zone</text>
  <text x="540" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#166534" text-anchor="middle">Häufig und qualitativ hochwertig</text>
  <text x="540" y="168" font-family="system-ui, sans-serif" font-size="10" fill="#166534" text-anchor="middle">Besseres Store-Ranking,</text>
  <text x="540" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#166534" text-anchor="middle">hohe Nutzerbindung,</text>
  <text x="540" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#166534" text-anchor="middle">starke Store-Bewertungen.</text>
  <!-- Green badge -->
  <rect x="494" y="212" width="92" height="20" fill="#10b981" rx="10"/>
  <text x="540" y="226" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Ziel-Bereich</text>

  <!-- Bottom-left: Risiko-Zone -->
  <text x="260" y="285" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#dc2626" text-anchor="middle">Risiko-Zone</text>
  <text x="260" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">Selten und instabil</text>
  <text x="260" y="323" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">Sinkende Bewertungen,</text>
  <text x="260" y="337" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">kein Feedback-Loop,</text>
  <text x="260" y="351" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">Nutzerabwanderung.</text>
  <!-- Red badge -->
  <rect x="214" y="366" width="92" height="20" fill="#ef4444" rx="10"/>
  <text x="260" y="380" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Vermeiden</text>

  <!-- Bottom-right: Bug-Schleife -->
  <text x="540" y="285" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#dc2626" text-anchor="middle">Bug-Schleife</text>
  <text x="540" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">Häufig, aber fehlerhaft</text>
  <text x="540" y="323" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">Crash-Rate steigt,</text>
  <text x="540" y="337" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">Bewertungen sinken,</text>
  <text x="540" y="351" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">Nutzer frustriert.</text>
  <!-- Red badge -->
  <rect x="494" y="366" width="92" height="20" fill="#ef4444" rx="10"/>
  <text x="540" y="380" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Vermeiden</text>

  <!-- X-axis label (Update-Häufigkeit) -->
  <text x="400" y="428" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">Update-Häufigkeit</text>
  <!-- Arrow left -->
  <line x1="150" y1="420" x2="370" y2="420" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="140" y="424" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="end">selten</text>
  <!-- Arrow right -->
  <line x1="650" y1="420" x2="430" y2="420" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="660" y="424" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="start">häufig</text>

  <!-- Y-axis label (Qualität) -->
  <text x="56" y="244" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569" text-anchor="middle" transform="rotate(-90 56 244)">Update-Qualität</text>
  <!-- Arrow down (low) -->
  <line x1="88" y1="360" x2="88" y2="260" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="88" y="380" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">niedrig</text>
  <!-- Arrow up (high) -->
  <line x1="88" y1="120" x2="88" y2="220" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="88" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">hoch</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Source note -->
  <text x="400" y="458" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">App-Care — Release-Management für Mobile Apps</text>
</svg>

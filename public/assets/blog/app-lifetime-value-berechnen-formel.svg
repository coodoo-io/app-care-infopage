<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="App Lifetime Value Formel: LTV = ARPU geteilt durch Churn Rate" font-family="system-ui, sans-serif">
  <title>App LTV berechnen: Formel und Beispielrechnung</title>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="56" fill="#172554" rx="12"/>
  <rect x="0" y="44" width="800" height="12" fill="#172554"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="white" letter-spacing="0.3">App Lifetime Value berechnen: LTV-Formel und Einflussfaktoren</text>

  <!-- === FORMEL SECTION === -->
  <!-- ARPU box -->
  <rect x="48" y="90" width="180" height="80" rx="10" fill="#2563eb"/>
  <text x="138" y="122" text-anchor="middle" font-size="22" font-weight="800" fill="white">ARPU</text>
  <text x="138" y="148" text-anchor="middle" font-size="11" fill="#bfdbfe">Average Revenue Per User</text>

  <!-- Division line -->
  <rect x="48" y="176" width="180" height="4" fill="#2563eb" rx="2"/>

  <!-- Churn Rate box -->
  <rect x="48" y="186" width="180" height="80" rx="10" fill="#ef4444"/>
  <text x="138" y="218" text-anchor="middle" font-size="22" font-weight="800" fill="white">Churn Rate</text>
  <text x="138" y="244" text-anchor="middle" font-size="11" fill="#fecaca">Monatliche Abwanderungsrate</text>

  <!-- = sign -->
  <text x="272" y="148" text-anchor="middle" font-size="36" font-weight="700" fill="#475569">=</text>

  <!-- LTV result box -->
  <rect x="300" y="90" width="200" height="176" rx="12" fill="#10b981"/>
  <text x="400" y="152" text-anchor="middle" font-size="36" font-weight="900" fill="white">LTV</text>
  <text x="400" y="182" text-anchor="middle" font-size="13" fill="#d1fae5">Lifetime Value</text>
  <text x="400" y="204" text-anchor="middle" font-size="11" fill="#a7f3d0">pro Nutzer</text>
  <text x="400" y="234" text-anchor="middle" font-size="11" fill="#ecfdf5">= monetärer Nutzerwert</text>

  <!-- Arrow right -->
  <line x1="510" y1="178" x2="548" y2="178" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- === BEISPIELRECHNUNG === -->
  <rect x="555" y="90" width="200" height="176" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="655" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a5f">Beispielrechnung</text>
  <line x1="575" y1="126" x2="735" y2="126" stroke="#e2e8f0" stroke-width="1"/>

  <text x="575" y="150" font-size="12" fill="#475569">ARPU</text>
  <text x="735" y="150" text-anchor="end" font-size="13" font-weight="700" fill="#2563eb">5 €/Monat</text>

  <text x="575" y="174" font-size="12" fill="#475569">Churn Rate</text>
  <text x="735" y="174" text-anchor="end" font-size="13" font-weight="700" fill="#ef4444">5 %</text>

  <line x1="575" y1="186" x2="735" y2="186" stroke="#e2e8f0" stroke-width="1"/>

  <text x="575" y="207" font-size="12" fill="#475569">LTV</text>
  <text x="735" y="207" text-anchor="end" font-size="16" font-weight="800" fill="#10b981">= 100 €</text>

  <text x="575" y="228" font-size="10" fill="#94a3b8">Ø Nutzungsdauer:</text>
  <text x="735" y="228" text-anchor="end" font-size="10" font-weight="600" fill="#94a3b8">20 Monate</text>

  <text x="575" y="248" font-size="10" fill="#64748b">5 € ÷ 0,05 = 100 €</text>

  <!-- === EINFLUSSFAKTOREN === -->
  <text x="48" y="302" font-size="13" font-weight="700" fill="#1e3a5f">Einflussfaktoren auf den LTV</text>
  <line x1="48" y1="312" x2="752" y2="312" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Factor 1 -->
  <rect x="48" y="324" width="218" height="56" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <rect x="48" y="324" width="8" height="56" rx="4" fill="#10b981"/>
  <text x="72" y="346" font-size="12" font-weight="700" fill="#10b981">Retention erhoehen</text>
  <text x="72" y="364" font-size="11" fill="#475569">Laengere Nutzungsdauer</text>
  <text x="72" y="376" font-size="11" fill="#475569">= direkt hoeherer LTV</text>

  <!-- Factor 2 -->
  <rect x="292" y="324" width="218" height="56" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="292" y="324" width="8" height="56" rx="4" fill="#2563eb"/>
  <text x="316" y="346" font-size="12" font-weight="700" fill="#2563eb">ARPU steigern</text>
  <text x="316" y="364" font-size="11" fill="#475569">Preis / Upsell optimieren</text>
  <text x="316" y="376" font-size="11" fill="#475569">= hoehere Monatsumsaetze</text>

  <!-- Factor 3 -->
  <rect x="536" y="324" width="218" height="56" rx="8" fill="white" stroke="#f97316" stroke-width="1.5"/>
  <rect x="536" y="324" width="8" height="56" rx="4" fill="#f97316"/>
  <text x="560" y="346" font-size="12" font-weight="700" fill="#f97316">Churn senken</text>
  <text x="560" y="364" font-size="11" fill="#475569">Re-Engagement &amp; besseres</text>
  <text x="560" y="376" font-size="11" fill="#475569">Onboarding</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>

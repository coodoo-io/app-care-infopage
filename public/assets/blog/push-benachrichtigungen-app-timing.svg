  <rect x="145" y="242" width="150" height="28" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="5"/>
  <text x="220" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Gut</text>

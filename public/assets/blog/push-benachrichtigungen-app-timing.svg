  <text x="167" y="382" font-size="11" fill="#334155">Gut (hohe Öffnungsrate)</text>
  <rect x="330" y="372" width="14" height="12" fill="#ffedd5" stroke="#f97316" stroke-width="1.5" rx="2"/>
  <text x="349" y="382" font-size="11" fill="#334155">Mittel</text>
  <rect x="410" y="372" width="14" height="12" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" rx="2"/>

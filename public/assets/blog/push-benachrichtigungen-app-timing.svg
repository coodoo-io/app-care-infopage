  <!-- Abend: gut -->
  <rect x="465" y="242" width="150" height="28" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="5"/>
  <text x="540" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Gut</text>
  <!-- Nacht: schlecht -->
  <rect x="625" y="242" width="150" height="28" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="700" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Vermeiden</text>

  <!-- ===== ROW 6: Samstag (center y=296) ===== -->
  <!-- Morgen: mittel -->
  <rect x="145" y="284" width="150" height="28" fill="#ffedd5" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="220" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#7c2d12">Mittel</text>
  <!-- Mittag: gut -->
  <rect x="305" y="284" width="150" height="28" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="5"/>
  <text x="380" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Gut</text>
  <!-- Abend: mittel -->
  <rect x="465" y="284" width="150" height="28" fill="#ffedd5" stroke="#f97316" stroke-width="1.5" rx="5"/>

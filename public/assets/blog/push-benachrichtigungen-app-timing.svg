  <!-- Nacht: schlecht -->
  <rect x="625" y="284" width="150" height="28" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="700" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Vermeiden</text>


  <rect x="145" y="326" width="150" height="28" fill="#ffedd5" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="220" y="344" text-anchor="middle" font-size="11" font-weight="600" fill="#7c2d12">Mittel</text>
  <!-- Mittag: gut -->
  <rect x="305" y="326" width="150" height="28" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="5"/>

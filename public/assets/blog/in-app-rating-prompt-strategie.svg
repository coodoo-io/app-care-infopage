<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rating-Prompt-Strategie: Entscheidungsbaum von positivem Event bis Store-Review oder internem Feedback" font-family="system-ui, sans-serif">
  <title>Rating-Prompt-Strategie: Entscheidungsbaum für optimalen Prompt-Einsatz</title>

  <!-- Background -->
  <rect width="800" height="420" fill="#f8fafc" rx="12"/>

  <!-- Headline -->
  <text x="400" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Rating-Prompt-Strategie: Entscheidungsbaum</text>

  <!-- ===== NODE 1: Start — Nutzer hat Aktion durchgeführt ===== -->
  <!-- Diamond shape (rotated rect) for decision -->
  <rect x="280" y="52" width="240" height="48" rx="8" fill="#2563eb"/>
  <text x="400" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Nutzer hat positive Aktion</text>
  <text x="400" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">durchgeführt?</text>

  <!-- Arrow down -->
  <line x1="400" y1="100" x2="400" y2="128" stroke="#2563eb" stroke-width="2"/>
  <polygon points="394,125 400,133 406,125" fill="#2563eb"/>
  <text x="414" y="120" font-size="11" fill="#059669" font-weight="600">Ja</text>

  <!-- ===== NODE 2: Richtiger Zeitpunkt? ===== -->
  <!-- Diamond / decision box -->
  <polygon points="400,138 520,172 400,206 280,172" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="400" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Richtiger</text>
  <text x="400" y="183" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Zeitpunkt?</text>

  <!-- "Nein" path LEFT from diamond (bad timing) -->
  <line x1="280" y1="172" x2="170" y2="172" stroke="#ef4444" stroke-width="2"/>
  <polygon points="173,166 165,172 173,178" fill="#ef4444"/>
  <text x="228" y="165" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">Nein</text>

  <!-- Bad timing result box -->
  <rect x="60" y="148" width="108" height="48" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="114" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Kein Prompt</text>
  <text x="114" y="182" text-anchor="middle" font-size="10" fill="#ef4444">Slot sparen</text>

  <!-- "Ja" path DOWN from diamond -->
  <line x1="400" y1="206" x2="400" y2="234" stroke="#2563eb" stroke-width="2"/>
  <polygon points="394,231 400,239 406,231" fill="#2563eb"/>
  <text x="414" y="226" font-size="11" fill="#059669" font-weight="600">Ja</text>

  <!-- ===== NODE 3: Prompt zeigen ===== -->
  <rect x="300" y="242" width="200" height="44" rx="8" fill="#0f172a"/>
  <text x="400" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">In-App-Rating-Prompt</text>
  <text x="400" y="274" text-anchor="middle" font-size="11" fill="#94a3b8">System-Dialog erscheint</text>

  <!-- Arrow down from prompt -->
  <line x1="400" y1="286" x2="400" y2="314" stroke="#475569" stroke-width="2"/>
  <polygon points="394,311 400,319 406,311" fill="#475569"/>

  <!-- ===== NODE 4: Nutzer zufrieden? ===== -->
  <polygon points="400,320 510,352 400,384 290,352" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="400" y="348" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Nutzer</text>
  <text x="400" y="363" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">zufrieden?</text>

  <!-- "Ja" path RIGHT — Store Review -->
  <line x1="510" y1="352" x2="604" y2="352" stroke="#10b981" stroke-width="2"/>
  <polygon points="601,346 609,352 601,358" fill="#10b981"/>
  <text x="558" y="345" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">Ja</text>

  <rect x="608" y="328" width="130" height="48" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="673" y="348" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Store-Review</text>
  <text x="673" y="364" text-anchor="middle" font-size="10" fill="#10b981">4-5 Sterne</text>

  <!-- "Nein" path LEFT — Internes Feedback -->
  <line x1="290" y1="352" x2="190" y2="352" stroke="#ef4444" stroke-width="2"/>
  <polygon points="193,346 185,352 193,358" fill="#ef4444"/>
  <text x="238" y="345" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">Nein</text>

  <rect x="60" y="328" width="130" height="48" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="125" y="348" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Internes Feedback</text>
  <text x="125" y="364" text-anchor="middle" font-size="10" fill="#ef4444">Problem lösen</text>

  <!-- Feedback loop arrow: Internes Feedback → oben (nach Lösung retry) -->
  <path d="M60 352 Q20 352 20 100 Q20 52 280 66" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="278,60 286,66 278,72" fill="#94a3b8"/>
  <text x="14" y="215" font-size="10" fill="#94a3b8" transform="rotate(-90, 14, 215)">Nach Behebung erneut versuchen</text>

  <!-- "Nein" from first node (positive action? = Nein) — path downward left -->
  <!-- Arrow from Node 1 "Nein" going right out -->
  <line x1="520" y1="76" x2="636" y2="76" stroke="#ef4444" stroke-width="2"/>
  <polygon points="633,70 641,76 633,82" fill="#ef4444"/>
  <text x="578" y="69" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">Nein</text>
  <rect x="640" y="52" width="108" height="48" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="694" y="72" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Warten</text>
  <text x="694" y="86" text-anchor="middle" font-size="10" fill="#ef4444">Auf nächsten Trigger</text>
</svg>

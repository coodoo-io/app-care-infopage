<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Release Notes Vorher/Nachher-Vergleich: Schlechte vs. gute Beispiele" font-family="system-ui, sans-serif">
  <title>Release Notes Vorher/Nachher: Schlechte vs. gute Beispiele im Vergleich</title>

  <!-- Background -->
  <rect width="800" height="380" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Release Notes: Vorher / Nachher</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#64748b">Gleiche Version — unterschiedliche Wirkung</text>

  <!-- ===== LEFT COLUMN: SCHLECHT ===== -->
  <!-- Column label -->
  <rect x="40" y="70" width="340" height="30" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="210" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Schlecht — so nicht</text>

  <!-- Card -->
  <rect x="40" y="108" width="340" height="148" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>

  <!-- App Store header inside card -->
  <rect x="40" y="108" width="340" height="30" rx="10" fill="#fef2f2"/>
  <rect x="40" y="122" width="340" height="16" fill="#fef2f2"/>
  <text x="210" y="128" text-anchor="middle" font-size="10" fill="#7f1d1d">App Store · Neue Funktionen</text>

  <!-- Bad content -->
  <text x="60" y="160" font-size="13" font-weight="700" fill="#0f172a">Version 2.4.1</text>
  <text x="60" y="182" font-size="12" fill="#374151">- Bug fixes</text>
  <text x="60" y="200" font-size="12" fill="#374151">- Performance improvements</text>
  <text x="60" y="218" font-size="12" fill="#374151">- Minor UI changes</text>

  <!-- Annotations for bad -->
  <!-- Arrow to "Bug fixes" -->
  <line x1="250" y1="182" x2="330" y2="182" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Bad reasons list -->
  <rect x="40" y="268" width="340" height="90" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="60" y="286" font-size="11" font-weight="700" fill="#b91c1c">Warum das nicht funktioniert:</text>
  <text x="60" y="304" font-size="10.5" fill="#7f1d1d">· Kein einziger konkreter Nutzen benannt</text>
  <text x="60" y="319" font-size="10.5" fill="#7f1d1d">· "Minor UI changes" — was wurde geändert?</text>
  <text x="60" y="334" font-size="10.5" fill="#7f1d1d">· Kein Feedback-Signal, kein Dank, keine Energie</text>
  <text x="60" y="349" font-size="10.5" fill="#7f1d1d">· Sieht aus wie jedes andere Update</text>

  <!-- X icon on bad card -->
  <circle cx="358" cy="123" r="11" fill="#ef4444"/>
  <line x1="353" y1="118" x2="363" y2="128" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="363" y1="118" x2="353" y2="128" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ===== CENTER DIVIDER ===== -->
  <line x1="400" y1="70" x2="400" y2="358" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="372" y="195" width="56" height="24" rx="12" fill="#e2e8f0"/>
  <text x="400" y="212" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">vs.</text>

  <!-- ===== RIGHT COLUMN: GUT ===== -->
  <!-- Column label -->
  <rect x="420" y="70" width="340" height="30" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="590" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Gut — so geht es</text>

  <!-- Card -->
  <rect x="420" y="108" width="340" height="148" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2"/>

  <!-- App Store header inside card -->
  <rect x="420" y="108" width="340" height="30" rx="10" fill="#f0fdf4"/>
  <rect x="420" y="122" width="340" height="16" fill="#f0fdf4"/>
  <text x="590" y="128" text-anchor="middle" font-size="10" fill="#065f46">App Store · Neue Funktionen</text>

  <!-- Good content -->
  <text x="440" y="156" font-size="12" font-weight="700" fill="#0f172a">Schnellere Ladezeiten und neues Dashboard</text>
  <text x="440" y="172" font-size="11" fill="#374151">- Das Dashboard lädt jetzt 40 % schneller</text>
  <text x="440" y="189" font-size="11" fill="#374151">- Neuer Übersichtsscreen zeigt alle KPIs</text>
  <text x="440" y="206" font-size="11" fill="#374151">- 3 Abstürze beim Login behoben</text>
  <text x="440" y="223" font-size="11" fill="#10b981" font-weight="500">Danke für euer Feedback!</text>

  <!-- Checkmark icon on good card -->
  <circle cx="738" cy="123" r="11" fill="#10b981"/>
  <polyline points="733,123 737,127 744,118" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Good reasons list -->
  <rect x="420" y="268" width="340" height="90" rx="8" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text x="440" y="286" font-size="11" font-weight="700" fill="#065f46">Warum das funktioniert:</text>
  <text x="440" y="304" font-size="10.5" fill="#064e3b">· Konkreter Nutzen in Zeile 1 (Ladezeit, Dashboard)</text>
  <text x="440" y="319" font-size="10.5" fill="#064e3b">· Messbare Verbesserung: "40 % schneller"</text>
  <text x="440" y="334" font-size="10.5" fill="#064e3b">· Bug klar benannt: "3 Abstürze beim Login"</text>
  <text x="440" y="349" font-size="10.5" fill="#064e3b">· Endet mit Dank — Team wirkt nahbar</text>

  <!-- Bottom note -->
  <text x="400" y="372" text-anchor="middle" font-size="10" fill="#94a3b8">Beide Texte beschreiben dasselbe Update — der Unterschied liegt allein in der Kommunikation.</text>
</svg>

<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Session Replay Workflow: Von der Aufzeichnung zur UX-Verbesserung" font-family="system-ui, sans-serif">
  <title>Session Replay Workflow: Von der Aufzeichnung zur UX-Verbesserung</title>

  <!-- Background -->
  <rect width="800" height="300" fill="#f8fafc" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="#172554" rx="12"/>
  <rect x="0" y="38" width="800" height="12" fill="#172554"/>
  <text x="400" y="30" text-anchor="middle" fill="white" font-size="15" font-weight="700" letter-spacing="0.3">Session Replay Workflow: Von der Auffälligkeit zur Verbesserung</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="16" y="72" width="132" height="140" fill="white" rx="10" stroke="#2563eb" stroke-width="2"/>
  <rect x="16" y="72" width="132" height="36" fill="#2563eb" rx="10"/>
  <rect x="16" y="96" width="132" height="12" fill="#2563eb"/>
  <text x="82" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">Schritt 1</text>
  <text x="82" y="133" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Auffälligkeit in</text>
  <text x="82" y="149" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Analytics entdecken</text>
  <text x="82" y="171" text-anchor="middle" fill="#475569" font-size="10">z.B. hoher Abbruch</text>
  <text x="82" y="185" text-anchor="middle" fill="#475569" font-size="10">auf Screen X</text>

  <!-- Arrow 1->2 -->
  <line x1="148" y1="142" x2="168" y2="142" stroke="#2563eb" stroke-width="2.5"/>
  <polygon points="168,136 180,142 168,148" fill="#2563eb"/>

  <!-- Step 2 -->
  <rect x="180" y="72" width="132" height="140" fill="white" rx="10" stroke="#10b981" stroke-width="2"/>
  <rect x="180" y="72" width="132" height="36" fill="#10b981" rx="10"/>
  <rect x="180" y="96" width="132" height="12" fill="#10b981"/>
  <text x="246" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">Schritt 2</text>
  <text x="246" y="133" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Session Replays</text>
  <text x="246" y="149" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">filtern</text>
  <text x="246" y="171" text-anchor="middle" fill="#475569" font-size="10">Nur Sessions mit</text>
  <text x="246" y="185" text-anchor="middle" fill="#475569" font-size="10">Abbruch auf Screen X</text>

  <!-- Arrow 2->3 -->
  <line x1="312" y1="142" x2="332" y2="142" stroke="#10b981" stroke-width="2.5"/>
  <polygon points="332,136 344,142 332,148" fill="#10b981"/>

  <!-- Step 3 -->
  <rect x="344" y="72" width="132" height="140" fill="white" rx="10" stroke="#f97316" stroke-width="2"/>
  <rect x="344" y="72" width="132" height="36" fill="#f97316" rx="10"/>
  <rect x="344" y="96" width="132" height="12" fill="#f97316"/>
  <text x="410" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">Schritt 3</text>
  <text x="410" y="133" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Muster in mehreren</text>
  <text x="410" y="149" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Sessions erkennen</text>
  <text x="410" y="171" text-anchor="middle" fill="#475569" font-size="10">Min. 10–15 Sessions</text>
  <text x="410" y="185" text-anchor="middle" fill="#475569" font-size="10">analysieren</text>

  <!-- Arrow 3->4 -->
  <line x1="476" y1="142" x2="496" y2="142" stroke="#f97316" stroke-width="2.5"/>
  <polygon points="496,136 508,142 496,148" fill="#f97316"/>

  <!-- Step 4 -->
  <rect x="508" y="72" width="132" height="140" fill="white" rx="10" stroke="#7c3aed" stroke-width="2"/>
  <rect x="508" y="72" width="132" height="36" fill="#7c3aed" rx="10"/>
  <rect x="508" y="96" width="132" height="12" fill="#7c3aed"/>
  <text x="574" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">Schritt 4</text>
  <text x="574" y="133" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Hypothese</text>
  <text x="574" y="149" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">formulieren</text>
  <text x="574" y="171" text-anchor="middle" fill="#475569" font-size="10">z.B. "Button nicht</text>
  <text x="574" y="185" text-anchor="middle" fill="#475569" font-size="10">sichtbar genug"</text>

  <!-- Arrow 4->5 -->
  <line x1="640" y1="142" x2="660" y2="142" stroke="#7c3aed" stroke-width="2.5"/>
  <polygon points="660,136 672,142 660,148" fill="#7c3aed"/>

  <!-- Step 5 -->
  <rect x="672" y="72" width="112" height="140" fill="white" rx="10" stroke="#059669" stroke-width="2"/>
  <rect x="672" y="72" width="112" height="36" fill="#059669" rx="10"/>
  <rect x="672" y="96" width="112" height="12" fill="#059669"/>
  <text x="728" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="700">Schritt 5</text>
  <text x="728" y="133" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">UX-Änderung</text>
  <text x="728" y="149" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">umsetzen &amp;</text>
  <text x="728" y="163" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Effekt messen</text>
  <text x="728" y="185" text-anchor="middle" fill="#475569" font-size="10">Zurück zu Schritt 1</text>

  <!-- Step numbers - circles -->
  <circle cx="82" cy="240" r="16" fill="#2563eb"/>
  <text x="82" y="245" text-anchor="middle" fill="white" font-size="13" font-weight="700">1</text>

  <circle cx="246" cy="240" r="16" fill="#10b981"/>
  <text x="246" y="245" text-anchor="middle" fill="white" font-size="13" font-weight="700">2</text>

  <circle cx="410" cy="240" r="16" fill="#f97316"/>
  <text x="410" y="245" text-anchor="middle" fill="white" font-size="13" font-weight="700">3</text>

  <circle cx="574" cy="240" r="16" fill="#7c3aed"/>
  <text x="574" y="245" text-anchor="middle" fill="white" font-size="13" font-weight="700">4</text>

  <circle cx="728" cy="240" r="16" fill="#059669"/>
  <text x="728" y="245" text-anchor="middle" fill="white" font-size="13" font-weight="700">5</text>

  <!-- Connecting lines between circles -->
  <line x1="98" y1="240" x2="230" y2="240" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="262" y1="240" x2="394" y2="240" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="426" y1="240" x2="558" y2="240" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="590" y1="240" x2="712" y2="240" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Footer caption -->
  <text x="400" y="278" text-anchor="middle" fill="#94a3b8" font-size="11">Iterativer Prozess — jede Messung ist der Ausgangspunkt des nächsten Zyklus</text>
</svg>

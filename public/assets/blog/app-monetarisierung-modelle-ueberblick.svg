<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Die 5 App-Monetarisierungsmodelle im Überblick" font-family="system-ui, sans-serif">
  <title>App-Monetarisierung: Die 5 Modelle</title>

  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc" rx="12"/>

  <!-- Chart title -->
  <text x="400" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Die 5 App-Monetarisierungsmodelle im Überblick</text>

  <!-- === Row 1: Cards 1–3 === -->

  <!-- Card 1: Freemium -->
  <rect x="28" y="56" width="228" height="168" fill="#ffffff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Color bar top -->
  <rect x="28" y="56" width="228" height="6" fill="#2563eb" rx="10"/>
  <rect x="28" y="62" width="228" height="4" fill="#2563eb"/>
  <!-- Icon circle -->
  <circle cx="66" cy="100" r="18" fill="#eff6ff"/>
  <!-- Icon: layered stacks (free/premium) -->
  <rect x="56" y="95" width="20" height="5" fill="#2563eb" rx="2"/>
  <rect x="56" y="102" width="20" height="5" fill="#93c5fd" rx="2"/>
  <rect x="56" y="109" width="20" height="5" fill="#bfdbfe" rx="2"/>
  <!-- Title -->
  <text x="92" y="97" font-size="14" font-weight="700" fill="#1e293b">Freemium</text>
  <text x="92" y="114" font-size="11" fill="#2563eb" font-weight="600">Basis kostenlos · Premium zahlt</text>
  <!-- Divider -->
  <line x1="44" y1="128" x2="240" y2="128" stroke="#f1f5f9" stroke-width="1"/>
  <!-- Description -->
  <text x="44" y="148" font-size="11" fill="#475569">Kernfunktionen gratis, erweiterte</text>
  <text x="44" y="163" font-size="11" fill="#475569">Features kostenpflichtig</text>
  <!-- Anwendungsfall -->
  <text x="44" y="183" font-size="10" fill="#94a3b8">Anwendungsfall:</text>
  <text x="44" y="197" font-size="11" font-weight="600" fill="#334155">Productivity, Cloud-Storage</text>
  <!-- Conversion badge -->
  <rect x="44" y="208" width="128" height="8" fill="#eff6ff" rx="4"/>
  <text x="108" y="215" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="600">Conversion: 2–5 % → Premium</text>

  <!-- Card 2: Subscription -->
  <rect x="286" y="56" width="228" height="168" fill="#ffffff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="286" y="56" width="228" height="6" fill="#10b981" rx="10"/>
  <rect x="286" y="62" width="228" height="4" fill="#10b981"/>
  <circle cx="324" cy="100" r="18" fill="#ecfdf5"/>
  <!-- Icon: recurring arrows -->
  <path d="M316 96 Q317 91 324 91 Q331 91 332 96" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <polygon points="332,96 336,92 336,100" fill="#10b981"/>
  <path d="M332 104 Q331 109 324 109 Q317 109 316 104" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <polygon points="316,104 312,100 312,108" fill="#10b981"/>
  <text x="350" y="97" font-size="14" font-weight="700" fill="#1e293b">Subscription</text>
  <text x="350" y="114" font-size="11" fill="#10b981" font-weight="600">Monatlich · Jährlich · Höchster LTV</text>
  <line x1="302" y1="128" x2="498" y2="128" stroke="#f1f5f9" stroke-width="1"/>
  <text x="302" y="148" font-size="11" fill="#475569">Wiederkehrende Zahlung für</text>
  <text x="302" y="163" font-size="11" fill="#475569">kontinuierlichen Zugang</text>
  <text x="302" y="183" font-size="10" fill="#94a3b8">Anwendungsfall:</text>
  <text x="302" y="197" font-size="11" font-weight="600" fill="#334155">SaaS, Content, B2B-Tools</text>
  <rect x="302" y="208" width="136" height="8" fill="#ecfdf5" rx="4"/>
  <text x="370" y="215" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">~80 % Umsatz der Top-Apps</text>

  <!-- Card 3: In-App-Käufe -->
  <rect x="544" y="56" width="228" height="168" fill="#ffffff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="544" y="56" width="228" height="6" fill="#f97316" rx="10"/>
  <rect x="544" y="62" width="228" height="4" fill="#f97316"/>
  <circle cx="582" cy="100" r="18" fill="#fff7ed"/>
  <!-- Icon: cart / shopping bag simplified -->
  <rect x="574" y="96" width="16" height="12" fill="none" stroke="#f97316" stroke-width="1.8" rx="2"/>
  <path d="M577 96 Q577 91 582 91 Q587 91 587 96" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="577" cy="111" r="1.5" fill="#f97316"/>
  <circle cx="585" cy="111" r="1.5" fill="#f97316"/>
  <text x="608" y="97" font-size="14" font-weight="700" fill="#1e293b">In-App-Käufe</text>
  <text x="608" y="114" font-size="11" fill="#f97316" font-weight="600">IAP · Gaming-dominant</text>
  <line x1="560" y1="128" x2="756" y2="128" stroke="#f1f5f9" stroke-width="1"/>
  <text x="560" y="148" font-size="11" fill="#475569">Kostenlose Basis, virtuelle Güter</text>
  <text x="560" y="163" font-size="11" fill="#475569">und Inhalte einzeln kaufen</text>
  <text x="560" y="183" font-size="10" fill="#94a3b8">Anwendungsfall:</text>
  <text x="560" y="197" font-size="11" font-weight="600" fill="#334155">Gaming, Social, Content</text>
  <rect x="560" y="208" width="144" height="8" fill="#fff7ed" rx="4"/>
  <text x="632" y="215" text-anchor="middle" font-size="9" fill="#f97316" font-weight="600">1–2 % Whales → 50–80 % Umsatz</text>

  <!-- === Row 2: Cards 4–5, centered === -->

  <!-- Card 4: Paid App — centered between card 1 and card 2 positions -->
  <rect x="157" y="248" width="228" height="168" fill="#ffffff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="157" y="248" width="228" height="6" fill="#ef4444" rx="10"/>
  <rect x="157" y="254" width="228" height="4" fill="#ef4444"/>
  <circle cx="195" cy="292" r="18" fill="#fef2f2"/>
  <!-- Icon: price tag -->
  <path d="M187 288 L192 283 L202 283 L202 293 L192 303 Z" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-linejoin="round"/>
  <circle cx="199" cy="286" r="1.8" fill="#ef4444"/>
  <text x="221" y="289" font-size="14" font-weight="700" fill="#1e293b">Paid App</text>
  <text x="221" y="306" font-size="11" fill="#ef4444" font-weight="600">Einmalig zahlen · Nischenmodell</text>
  <line x1="173" y1="320" x2="369" y2="320" stroke="#f1f5f9" stroke-width="1"/>
  <text x="173" y="340" font-size="11" fill="#475569">Einmalige Zahlung vor dem Download</text>
  <text x="173" y="355" font-size="11" fill="#475569">— vollständiger Zugang sofort</text>
  <text x="173" y="375" font-size="10" fill="#94a3b8">Anwendungsfall:</text>
  <text x="173" y="389" font-size="11" font-weight="600" fill="#334155">Pro-Tools, klares Alleinmerkmal</text>
  <rect x="173" y="400" width="140" height="8" fill="#fef2f2" rx="4"/>
  <text x="243" y="407" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="600">Sinkender Marktanteil</text>

  <!-- Card 5: Werbung — centered between card 2 and card 3 positions -->
  <rect x="415" y="248" width="228" height="168" fill="#ffffff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="415" y="248" width="228" height="6" fill="#8b5cf6" rx="10"/>
  <rect x="415" y="254" width="228" height="4" fill="#8b5cf6"/>
  <circle cx="453" cy="292" r="18" fill="#f5f3ff"/>
  <!-- Icon: megaphone / broadcast -->
  <path d="M445 287 L445 297 L449 297 L449 287 Z" fill="#8b5cf6" rx="1"/>
  <path d="M449 285 L459 279 L459 305 L449 299 Z" fill="#8b5cf6"/>
  <path d="M459 284 Q464 292 459 300" fill="none" stroke="#8b5cf6" stroke-width="1.8" stroke-linecap="round"/>
  <text x="479" y="289" font-size="14" font-weight="700" fill="#1e293b">Werbung</text>
  <text x="479" y="306" font-size="11" fill="#8b5cf6" font-weight="600">Ad-Supported · Kostenlos nutzen</text>
  <line x1="431" y1="320" x2="627" y2="320" stroke="#f1f5f9" stroke-width="1"/>
  <text x="431" y="340" font-size="11" fill="#475569">Kostenlos nutzbar, Umsatz über</text>
  <text x="431" y="355" font-size="11" fill="#475569">Werbeanzeigen (eCPM-basiert)</text>
  <text x="431" y="375" font-size="10" fill="#94a3b8">Anwendungsfall:</text>
  <text x="431" y="389" font-size="11" font-weight="600" fill="#334155">News, Casual Gaming, Utility</text>
  <rect x="431" y="400" width="148" height="8" fill="#f5f3ff" rx="4"/>
  <text x="505" y="407" text-anchor="middle" font-size="9" fill="#8b5cf6" font-weight="600">eCPM: 0,50–30 € / 1.000 Impressionen</text>

  <!-- Bottom note -->
  <text x="400" y="436" text-anchor="middle" font-size="10" fill="#94a3b8">Hybridmodelle kombinieren mehrere Ansätze — z. B. Freemium + Subscription oder Ad-Supported + IAP</text>
</svg>

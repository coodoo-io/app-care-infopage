<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mobile App Analytics: Die vier Event-Kategorien im Überblick">
  <title>App Analytics: Screen, Action, Conversion und Error Events</title>
  <rect width="800" height="400" fill="#ffffff" rx="12"/>

  <!-- Headline -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">MOBILE APP ANALYTICS — DIE VIER EVENT-KATEGORIEN</text>

  <!-- ======================== -->
  <!-- Card 1: Screen (blau)   -->
  <!-- ======================== -->
  <rect x="20" y="44" width="370" height="158" fill="#eff6ff" rx="10"/>
  <rect x="20" y="44" width="5" height="158" fill="#2563eb" rx="3"/>

  <!-- Icon: Bildschirm-Symbol -->
  <rect x="36" y="58" width="26" height="20" fill="none" stroke="#2563eb" stroke-width="2" rx="3"/>
  <line x1="44" y1="78" x2="52" y2="78" stroke="#2563eb" stroke-width="2"/>
  <rect x="47" y="78" width="6" height="4" fill="#2563eb" rx="1"/>

  <text x="72" y="68" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1d4ed8" letter-spacing="0.06em">SCREEN EVENTS</text>
  <text x="72" y="83" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">Bildschirm-Aufrufe erfassen</text>

  <line x1="36" y1="96" x2="378" y2="96" stroke="#bfdbfe" stroke-width="1"/>

  <text x="36" y="115" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Beispiel-Events:</text>
  <rect x="36" y="122" width="7" height="7" fill="#2563eb" rx="1"/>
  <text x="50" y="131" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">screen_view</text>
  <rect x="36" y="140" width="7" height="7" fill="#2563eb" rx="1"/>
  <text x="50" y="149" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">page_open</text>
  <rect x="36" y="158" width="7" height="7" fill="#2563eb" rx="1"/>
  <text x="50" y="167" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">modal_open / tab_switch</text>

  <text x="36" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">Grundlage fur Navigation-Flow-Analysen</text>

  <!-- ======================== -->
  <!-- Card 2: Action (grün)   -->
  <!-- ======================== -->
  <rect x="410" y="44" width="370" height="158" fill="#f0fdf4" rx="10"/>
  <rect x="410" y="44" width="5" height="158" fill="#10b981" rx="3"/>

  <!-- Icon: Finger-Tap-Symbol -->
  <circle cx="449" cy="68" r="11" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="449" cy="68" r="4" fill="#10b981"/>

  <text x="470" y="68" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46" letter-spacing="0.06em">ACTION EVENTS</text>
  <text x="470" y="83" font-family="system-ui, sans-serif" font-size="11" fill="#10b981">Nutzerinteraktionen dokumentieren</text>

  <line x1="426" y1="96" x2="768" y2="96" stroke="#a7f3d0" stroke-width="1"/>

  <text x="426" y="115" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Beispiel-Events:</text>
  <rect x="426" y="122" width="7" height="7" fill="#10b981" rx="1"/>
  <text x="440" y="131" font-family="system-ui, sans-serif" font-size="12" fill="#065f46">button_tap</text>
  <rect x="426" y="140" width="7" height="7" fill="#10b981" rx="1"/>
  <text x="440" y="149" font-family="system-ui, sans-serif" font-size="12" fill="#065f46">form_submit</text>
  <rect x="426" y="158" width="7" height="7" fill="#10b981" rx="1"/>
  <text x="440" y="167" font-family="system-ui, sans-serif" font-size="12" fill="#065f46">search_performed / swipe</text>

  <text x="426" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#10b981">Zeigt welche Features wirklich genutzt werden</text>

  <!-- ========================== -->
  <!-- Card 3: Conversion (orange)-->
  <!-- ========================== -->
  <rect x="20" y="222" width="370" height="158" fill="#fff7ed" rx="10"/>
  <rect x="20" y="222" width="5" height="158" fill="#f97316" rx="3"/>

  <!-- Icon: Ziel/Stern-Symbol -->
  <polygon points="449,236 452,244 461,244 454,249 457,258 449,253 442,258 445,249 438,244 447,244" fill="none" stroke="#f97316" stroke-width="2" transform="translate(-412,0)"/>

  <text x="72" y="246" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#c2410c" letter-spacing="0.06em">CONVERSION EVENTS</text>
  <text x="72" y="261" font-family="system-ui, sans-serif" font-size="11" fill="#f97316">Ziel-Ereignisse messen</text>

  <line x1="36" y1="274" x2="378" y2="274" stroke="#fed7aa" stroke-width="1"/>

  <text x="36" y="293" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c2410c">Beispiel-Events:</text>
  <rect x="36" y="300" width="7" height="7" fill="#f97316" rx="1"/>
  <text x="50" y="309" font-family="system-ui, sans-serif" font-size="12" fill="#c2410c">purchase / first_purchase</text>
  <rect x="36" y="318" width="7" height="7" fill="#f97316" rx="1"/>
  <text x="50" y="327" font-family="system-ui, sans-serif" font-size="12" fill="#c2410c">signup_complete</text>
  <rect x="36" y="336" width="7" height="7" fill="#f97316" rx="1"/>
  <text x="50" y="345" font-family="system-ui, sans-serif" font-size="12" fill="#c2410c">onboarding_complete</text>

  <text x="36" y="368" font-family="system-ui, sans-serif" font-size="11" fill="#f97316">Events die fur dein Geschaft zahlen</text>

  <!-- ======================== -->
  <!-- Card 4: Error (rot)     -->
  <!-- ======================== -->
  <rect x="410" y="222" width="370" height="158" fill="#fef2f2" rx="10"/>
  <rect x="410" y="222" width="5" height="158" fill="#ef4444" rx="3"/>

  <!-- Icon: Ausrufezeichen-Dreieck -->
  <polygon points="449,228 461,248 437,248" fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round" transform="translate(0,6)"/>
  <text x="449" y="246" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ef4444">!</text>

  <text x="470" y="246" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#991b1b" letter-spacing="0.06em">ERROR EVENTS</text>
  <text x="470" y="261" font-family="system-ui, sans-serif" font-size="11" fill="#ef4444">Fehler systematisch erfassen</text>

  <line x1="426" y1="274" x2="768" y2="274" stroke="#fecaca" stroke-width="1"/>

  <text x="426" y="293" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Beispiel-Events:</text>
  <rect x="426" y="300" width="7" height="7" fill="#ef4444" rx="1"/>
  <text x="440" y="309" font-family="system-ui, sans-serif" font-size="12" fill="#991b1b">api_error</text>
  <rect x="426" y="318" width="7" height="7" fill="#ef4444" rx="1"/>
  <text x="440" y="327" font-family="system-ui, sans-serif" font-size="12" fill="#991b1b">crash_trigger</text>
  <rect x="426" y="336" width="7" height="7" fill="#ef4444" rx="1"/>
  <text x="440" y="345" font-family="system-ui, sans-serif" font-size="12" fill="#991b1b">validation_error / timeout_error</text>

  <text x="426" y="368" font-family="system-ui, sans-serif" font-size="11" fill="#ef4444">Auch Fehler ohne App-Absturz erfassen</text>
</svg>
